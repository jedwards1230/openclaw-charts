name: Release

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "charts/**"
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get OpenClaw version and revision
        id: versions
        run: |
          VERSION=$(grep '^ARG OPENCLAW_VERSION=' Dockerfile | cut -d= -f2)
          REVISION=$(grep '^ARG IMAGE_REVISION=' Dockerfile | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not find ARG OPENCLAW_VERSION in Dockerfile"
            exit 1
          fi
          if [ -z "$REVISION" ]; then
            echo "::error::Could not find ARG IMAGE_REVISION in Dockerfile"
            exit 1
          fi
          IMAGE_TAG="${VERSION}-r${REVISION}"
          echo "openclaw_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=docker-${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "OpenClaw version: ${VERSION}, revision: r${REVISION}, image tag: ${IMAGE_TAG}"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.versions.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.versions.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.versions.outputs.tag }} not found — will create"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.versions.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.versions.outputs.image_tag }}
          build-args: |
            OPENCLAW_VERSION=${{ steps.versions.outputs.openclaw_version }}
          cache-from: type=gha,scope=openclaw
          cache-to: type=gha,mode=max,scope=openclaw
          provenance: true

      - name: Fetch upstream release notes
        if: steps.check.outputs.exists == 'false'
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.versions.outputs.openclaw_version }}"
          NOTES=$(gh api "repos/openclaw/openclaw/releases/tags/${VERSION}" --jq '.body // empty' 2>/dev/null || true)
          # Truncate to avoid exceeding release body limits
          NOTES="${NOTES:0:10000}"
          # Write to file to avoid shell quoting issues
          echo "$NOTES" > /tmp/upstream-notes.txt

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${{ steps.versions.outputs.image_tag }}"
          VERSION="${{ steps.versions.outputs.openclaw_version }}"
          TAG="${{ steps.versions.outputs.tag }}"
          UPSTREAM_NOTES=$(cat /tmp/upstream-notes.txt 2>/dev/null || true)

          NOTES="## Docker Image

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${IMAGE_TAG}
          \`\`\`

          - **OpenClaw**: [${VERSION}](https://github.com/openclaw/openclaw/releases/tag/${VERSION})
          - **Image revision**: r${{ steps.versions.outputs.revision }}"

          if [ -n "$UPSTREAM_NOTES" ]; then
            # Wrap in quad-backtick code fence to prevent @mention notifications
            NOTES="${NOTES}

          <details>
          <summary>Upstream release notes</summary>

          \`\`\`\`
          ${UPSTREAM_NOTES}
          \`\`\`\`

          </details>"
          fi

          gh release create "${TAG}" \
            --title "Docker ${IMAGE_TAG}" \
            --notes "$NOTES" \
            --target "${{ github.sha }}"

  helm-release:
    name: Helm Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get chart versions
        id: versions
        run: |
          CHART_VERSION=$(grep '^version:' charts/openclaw/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' charts/openclaw/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ -z "$CHART_VERSION" ] || [ -z "$APP_VERSION" ]; then
            echo "::error::Could not read chart version or app version from Chart.yaml"
            exit 1
          fi
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=openclaw-${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}, App version: ${APP_VERSION}"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.versions.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.versions.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.versions.outputs.tag }} not found — will create"
          fi

      - name: Set up Helm
        if: steps.check.outputs.exists == 'false'
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        if: steps.check.outputs.exists == 'false'
        run: |
          helm package charts/openclaw/
          helm push openclaw-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART_VERSION="${{ steps.versions.outputs.chart_version }}"
          APP_VERSION="${{ steps.versions.outputs.app_version }}"
          TAG="${{ steps.versions.outputs.tag }}"
          gh release create "${TAG}" \
            --title "Helm Chart ${CHART_VERSION}" \
            --notes "$(cat <<EOF
          ## Helm Chart

          \`\`\`bash
          helm install openclaw oci://ghcr.io/${{ github.repository_owner }}/charts/openclaw --version ${CHART_VERSION}
          \`\`\`

          For OpenClaw \`${APP_VERSION}\`. See [values.yaml](https://github.com/${{ github.repository }}/blob/${TAG}/charts/openclaw/values.yaml) for configuration reference.
          EOF
          )" \
            --target "${{ github.sha }}"
